<div class="relative min-h-screen overflow-x-hidden bg-black">
  <div class="relative z-10">

    <div class="fixed bottom-4 right-4 z-50">
      <button (click)="toggleSom()"
        class="bg-white/10 backdrop-blur-md text-white p-3 rounded-full shadow-lg hover:bg-white/20 transition-colors focus:outline-none border border-white/10">
        @if (isMuted()) {
        <span>🔇</span>
        } @else {
        <span>🔊</span>
        }
      </button>
    </div>

    <app-header></app-header>
    <main>
      <app-hero></app-hero>
      <app-about></app-about>
      <app-services></app-services>
      <app-projects></app-projects>
      <app-team></app-team>
      <app-faq></app-faq>
      <app-contact></app-contact>
    </main>

    <router-outlet />
  </div>
</div>
