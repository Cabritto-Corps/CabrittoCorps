<section class="relative h-screen w-full flex items-center justify-center overflow-hidden bg-background">
  <!-- Generative Art Canvas -->
  <canvas #canvas class="absolute inset-0 w-full h-full z-0 opacity-60"></canvas>

  <!-- Subtle Goat Watermark -->
  <div
    class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] opacity-[0.03] pointer-events-none z-0 animate-pulse">
    <img src="assets/logo-goat.svg" alt="" class="w-full h-full object-contain invert" />
  </div>

  <!-- Content -->
  <div class="relative z-10 container mx-auto px-6 text-center">
    <div class="space-y-8">
      <h1 class="text-6xl md:text-8xl font-bold tracking-tighter text-white mb-6" data-aos="fade-up"
        data-aos-duration="1000">
        CABRITTO<br>
        <span class="text-neutral-500">CORPS</span>
      </h1>

      <p class="text-xl md:text-2xl text-neutral-400 max-w-2xl mx-auto font-light tracking-wide" data-aos="fade-up"
        data-aos-delay="200">
        Arquitetando o futuro digital com precisão e elegância.
      </p>

      <div class="flex flex-col md:flex-row gap-6 justify-center items-center pt-12" data-aos="fade-up"
        data-aos-delay="400">
        <a href="#contact"
          class="group relative px-8 py-4 bg-white text-black font-bold tracking-widest uppercase overflow-hidden transition-all hover:scale-105">
          <span class="relative z-10">Iniciar Projeto</span>
          <div
            class="absolute inset-0 bg-neutral-200 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300">
          </div>
        </a>

        <a href="#projects"
          class="group px-8 py-4 border border-white/20 text-white font-bold tracking-widest uppercase hover:bg-white/5 transition-all">
          Ver Portfolio
        </a>
      </div>
    </div>
  </div>

  <!-- Scroll Indicator -->
  <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 animate-bounce text-neutral-500">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
    </svg>
  </div>
</section>
